<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projeto Movido</title>

<style>
:root{
    --bg:#0d1117;
    --card:#161b22;
    --accent:#3fb950;
    --accent-hover:#4cd964;
    --text:#f0f6fc;
    --sub:#8b949e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top, #1f2937 0%, #0d1117 50%),
        var(--bg);
    color:var(--text);
    overflow:hidden;
}

.card{
    width:min(90%, 550px);
    background:rgba(22,27,34,.9);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:40px;
    text-align:center;
    box-shadow:
        0 0 40px rgba(0,0,0,.4),
        0 0 80px rgba(63,185,80,.08);
    animation:fadeUp .7s ease;
}

.icon{
    font-size:4rem;
    margin-bottom:15px;
}

h1{
    margin-bottom:10px;
    font-size:2rem;
}

p{
    color:var(--sub);
    line-height:1.6;
    margin-bottom:30px;
}

.buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.btn{
    text-decoration:none;
    padding:14px 28px;
    border-radius:14px;
    font-weight:600;
    transition:.25s;
    position:relative;
    overflow:hidden;
}

.primary{
    background:var(--accent);
    color:#000;
}

.primary:hover{
    background:var(--accent-hover);
    transform:translateY(-3px);
    box-shadow:0 8px 25px rgba(76,217,100,.35);
}

.secondary{
    background:transparent;
    border:1px solid rgba(255,255,255,.15);
    color:var(--text);
}

.secondary:hover{
    transform:translateY(-3px);
    background:rgba(255,255,255,.05);
    border-color:var(--accent);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<script>
setTimeout(() => {
    window.location.href = "https://simulador-atmosense-52gt.onrender.com";
}, 3000);
</script>
<body>

<div class="card">
    <div class="icon">🚀</div>

    <h1>Projeto Transferido</h1>

    <p>
        O site não está mais hospedado no GitHub Pages devido a logistica.
        Utilize os botões abaixo para acessar a versão atual
        ou consultar o código-fonte.
    </p>

    <div class="buttons">
        <a href="https://simulador-atmosense-52gt.onrender.com"
           class="btn primary">
           Acessar Site
        </a>

        <a href="https://github.com/DMRG-pleroma/Simulador-AtmoSense"
           class="btn secondary">
           Repositório
        </a>
    </div>
</div>

</body>
</html>
